<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Mesh network nodes -->
  <circle cx="50" cy="20" r="8" fill="#2563eb"/>
  <circle cx="20" cy="50" r="8" fill="#2563eb"/>
  <circle cx="80" cy="50" r="8" fill="#2563eb"/>
  <circle cx="35" cy="80" r="8" fill="#2563eb"/>
  <circle cx="65" cy="80" r="8" fill="#2563eb"/>

  <!-- Mesh connections -->
  <line x1="50" y1="20" x2="20" y2="50" stroke="#93c5fd" stroke-width="2"/>
  <line x1="50" y1="20" x2="80" y2="50" stroke="#93c5fd" stroke-width="2"/>
  <line x1="20" y1="50" x2="35" y2="80" stroke="#93c5fd" stroke-width="2"/>
  <line x1="80" y1="50" x2="65" y2="80" stroke="#93c5fd" stroke-width="2"/>
  <line x1="35" y1="80" x2="65" y2="80" stroke="#93c5fd" stroke-width="2"/>
  <line x1="20" y1="50" x2="80" y2="50" stroke="#93c5fd" stroke-width="2"/>

  <!-- Radio waves from top node -->
  <path d="M 40 12 Q 50 5 60 12" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <path d="M 35 8 Q 50 -2 65 8" fill="none" stroke="#60a5fa" stroke-width="1"/>
</svg>
